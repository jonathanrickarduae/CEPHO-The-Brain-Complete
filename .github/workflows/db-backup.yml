name: Database Backup

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: "0 2 * * *"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual backup"
        required: false
        default: "Manual backup"

jobs:
  backup:
    name: Backup Production Database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pg_dump dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run database backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️ DATABASE_URL not set — skipping backup"
            exit 0
          fi

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="cepho_backup_${TIMESTAMP}.sql.gz"

          echo "📦 Starting backup: $BACKUP_FILE"

          # Extract connection details from DATABASE_URL
          pg_dump "$DATABASE_URL" \
            --no-password \
            --format=custom \
            --compress=9 \
            --file="${BACKUP_FILE}" \
            --verbose 2>&1 | tail -5

          echo "✅ Backup completed: $BACKUP_FILE"
          echo "📊 Size: $(du -sh $BACKUP_FILE | cut -f1)"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: "*.sql.gz"
          retention-days: 30
          if-no-files-found: warn

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Database backup FAILED at $(date)"
          echo "Check the workflow run for details."
