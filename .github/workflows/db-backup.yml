name: Database Backup

# S1-06 FIX: Activated daily backup schedule.
# Required GitHub Secrets (set at: repo Settings → Secrets → Actions):
#   DATABASE_URL           — Supabase connection string (same as Render env var)
#   AWS_ACCESS_KEY_ID      — S3 upload credentials (optional, falls back to artifact)
#   AWS_SECRET_ACCESS_KEY  — S3 upload credentials (optional)
#   BACKUP_S3_BUCKET       — S3 bucket name, e.g. "cepho-db-backups" (optional)
#   SLACK_WEBHOOK_URL      — For failure alerts (optional)

on:
  # Run daily at 2 AM UTC
  schedule:
    - cron: "0 2 * * *"
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual backup"
        required: false
        default: "Manual backup"

jobs:
  backup:
    name: Backup Production Database
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pg_dump dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Run database backup
        id: backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "❌ DATABASE_URL secret is not set."
            echo "   Go to: GitHub → Settings → Secrets → Actions → New repository secret"
            echo "   Name: DATABASE_URL"
            echo "   Value: Your Supabase connection string"
            exit 1
          fi

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          BACKUP_FILE="cepho_backup_${TIMESTAMP}.dump"
          echo "backup_file=${BACKUP_FILE}" >> $GITHUB_OUTPUT

          echo "📦 Starting backup: $BACKUP_FILE"

          pg_dump "$DATABASE_URL" \
            --no-password \
            --format=custom \
            --compress=9 \
            --file="${BACKUP_FILE}" 2>&1 | tail -5

          SIZE=$(du -sh "$BACKUP_FILE" | cut -f1)
          echo "✅ Backup completed: $BACKUP_FILE (${SIZE})"
          echo "backup_size=${SIZE}" >> $GITHUB_OUTPUT

      - name: Upload to S3 (if configured)
        if: steps.backup.outcome == 'success' && env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          pip install awscli --quiet
          BACKUP_FILE="${{ steps.backup.outputs.backup_file }}"
          aws s3 cp "$BACKUP_FILE" "s3://${BACKUP_S3_BUCKET}/backups/${BACKUP_FILE}"
          echo "☁️  Uploaded to s3://${BACKUP_S3_BUCKET}/backups/${BACKUP_FILE}"

      - name: Upload backup as GitHub artifact (fallback)
        if: steps.backup.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}-${{ steps.backup.outputs.backup_file }}
          path: "*.dump"
          retention-days: 30
          if-no-files-found: error

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"\u274c CEPHO database backup FAILED at $(date). Check: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Database Backup Successful" >> $GITHUB_STEP_SUMMARY
          echo "- **File:** ${{ steps.backup.outputs.backup_file }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size:** ${{ steps.backup.outputs.backup_size }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Retention:** 30 days (GitHub artifact)" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
