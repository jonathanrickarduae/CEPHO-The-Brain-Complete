services:
  # ─────────────────────────────────────────────
  # Production Service (deploys from main branch)
  # ─────────────────────────────────────────────
  - type: web
    name: cepho-the-brain-production
    runtime: node
    branch: main
    # db:migrate runs drizzle migrations before the app starts — single source of truth
    buildCommand: pnpm install && pnpm run build && pnpm run db:migrate
    startCommand: NODE_ENV=production node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22.13.0"
      # S1-05 FIX: Sentry error tracking — REQUIRED for production observability.
      # Create a project at https://sentry.io and paste the DSN below.
      # Without this, all production errors are invisible.
      - key: SENTRY_DSN
        sync: false  # Set manually in Render dashboard — never commit the real DSN
      - key: VITE_SENTRY_DSN
        sync: false  # Same DSN value — used by the frontend Sentry SDK
    # All other secrets (DATABASE_URL, JWT_SECRET, API keys, etc.)
    # are managed via Render's Environment Groups in the dashboard.

  # ─────────────────────────────────────────────
  # Staging Service (deploys from develop branch)
  # ─────────────────────────────────────────────
  - type: web
    name: cepho-the-brain-staging
    runtime: node
    branch: develop
    # db:migrate runs drizzle migrations before the app starts — single source of truth
    buildCommand: pnpm install && pnpm run build && pnpm run db:migrate
    startCommand: NODE_ENV=staging node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: staging
      - key: NODE_VERSION
        value: "22.13.0"
    # Staging environment variables are managed via a separate
    # Render Environment Group: "cepho-staging"
