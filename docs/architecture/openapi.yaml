openapi: 3.0.3
info:
  title: CEPHO.AI Platform API
  description: |
    Comprehensive API documentation for the CEPHO.AI platform.

    ## Authentication
    Most endpoints require authentication via session cookies.

    ## Rate Limiting
    - Global: 100 requests per 15 minutes
    - Auth endpoints: 5 requests per 15 minutes
    - Heavy operations: 10 requests per 15 minutes
    - Read-only: 200 requests per 15 minutes

    ## Error Handling
    All errors follow the standard format:
    ```json
    {
      "error": "Error Type",
      "message": "Human-readable error message",
      "code": "ERROR_CODE"
    }
    ```
  version: 1.0.0
  contact:
    name: CEPHO.AI Support
    url: https://cepho.ai
    email: support@cepho.ai
  license:
    name: Proprietary
    url: https://cepho.ai/terms

servers:
  - url: https://cepho-the-brain-complete.onrender.com
    description: Production server
  - url: http://localhost:5000
    description: Development server

tags:
  - name: Health
    description: Health check and monitoring endpoints
  - name: Analytics
    description: API usage analytics and metrics
  - name: Security
    description: Security-related endpoints (CSRF, etc.)
  - name: Authentication
    description: User authentication and session management
  - name: Projects
    description: Project management endpoints
  - name: Documents
    description: Document library and generation
  - name: AI Agents
    description: AI agent monitoring and management
  - name: Integrations
    description: Third-party integrations
  - name: Competitor Intelligence
    description: Competitor tracking, threat analysis, and AI market position reports
  - name: Persephone Board RAG
    description: Board knowledge corpus ingestion, semantic search, and RAG-enhanced responses (PB-01/02/03)
  - name: Scheduled Reports
    description: DB-persisted report schedules and on-demand AI report generation
  - name: Prompt Version History
    description: DB-persisted prompt versioning with rollback and comparison
  - name: Autonomous Ventures
    description: Autonomous venture creation, workflow orchestration, and kill switch control

paths:
  /health:
    get:
      tags:
        - Health
      summary: Basic health check
      description: Returns basic server health status
      operationId: getHealth
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  uptime:
                    type: number
                    description: Server uptime in seconds
                  environment:
                    type: string
                    example: production

  /health/ready:
    get:
      tags:
        - Health
      summary: Readiness probe
      description: Checks if server is ready to accept traffic (database connected, etc.)
      operationId: getHealthReady
      responses:
        "200":
          description: Server is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  timestamp:
                    type: string
                    format: date-time
                  checks:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          status:
                            type: string
                            example: ok
                      cache:
                        type: object
                        properties:
                          status:
                            type: string
                            example: not_configured
        "503":
          description: Server is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /health/live:
    get:
      tags:
        - Health
      summary: Liveness probe
      description: Checks if server process is alive
      operationId: getHealthLive
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: alive
                  timestamp:
                    type: string
                    format: date-time
                  pid:
                    type: integer
                    description: Process ID
                  uptime:
                    type: number
                    description: Process uptime in seconds
                  memory:
                    type: object
                    properties:
                      rss:
                        type: integer
                        description: Resident Set Size in bytes
                      heapTotal:
                        type: integer
                      heapUsed:
                        type: integer
                      external:
                        type: integer
                      arrayBuffers:
                        type: integer

  /health/startup:
    get:
      tags:
        - Health
      summary: Startup probe
      description: Checks if server has completed startup
      operationId: getHealthStartup
      responses:
        "200":
          description: Server startup complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: started
                  timestamp:
                    type: string
                    format: date-time
                  startupTime:
                    type: number
                    description: Time taken to start in seconds

  /api/metrics:
    get:
      tags:
        - Analytics
      summary: Prometheus metrics
      description: Returns Prometheus-formatted metrics for monitoring
      operationId: getMetrics
      responses:
        "200":
          description: Metrics in Prometheus format
          content:
            text/plain:
              schema:
                type: string
                example: |
                  # HELP process_cpu_user_seconds_total Total user CPU time spent in seconds.
                  # TYPE process_cpu_user_seconds_total counter
                  process_cpu_user_seconds_total 1.004257

  /api/analytics:
    get:
      tags:
        - Analytics
      summary: Get API usage analytics
      description: Returns comprehensive API usage statistics
      operationId: getAnalytics
      responses:
        "200":
          description: Analytics data
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRequests:
                    type: integer
                    description: Total number of requests tracked
                  uniqueEndpoints:
                    type: integer
                    description: Number of unique endpoints accessed
                  successRate:
                    type: number
                    format: float
                    description: Percentage of successful requests
                  errorRate:
                    type: number
                    format: float
                    description: Percentage of failed requests
                  avgResponseTime:
                    type: number
                    format: float
                    description: Average response time in milliseconds
                  endpoints:
                    type: array
                    items:
                      $ref: "#/components/schemas/EndpointStats"

  /api/analytics/endpoint:
    get:
      tags:
        - Analytics
      summary: Get endpoint-specific analytics
      description: Returns analytics for a specific endpoint
      operationId: getEndpointAnalytics
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Endpoint path to get analytics for
        - name: method
          in: query
          required: false
          schema:
            type: string
            enum: [GET, POST, PUT, DELETE, PATCH]
          description: HTTP method filter
      responses:
        "200":
          description: Endpoint analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointStats"
        "404":
          description: Endpoint not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/analytics/export:
    get:
      tags:
        - Analytics
      summary: Export analytics data
      description: Exports all analytics data as JSON
      operationId: exportAnalytics
      responses:
        "200":
          description: Analytics export
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportDate:
                    type: string
                    format: date-time
                  data:
                    type: object
                    description: Complete analytics data

  /api/analytics/reset:
    post:
      tags:
        - Analytics
      summary: Reset analytics data
      description: Clears all analytics data (requires admin)
      operationId: resetAnalytics
      security:
        - sessionAuth: []
      responses:
        "200":
          description: Analytics reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Analytics data reset successfully
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/csrf-token:
    get:
      tags:
        - Security
      summary: Get CSRF token
      description: Returns a CSRF token for form submissions
      operationId: getCsrfToken
      responses:
        "200":
          description: CSRF token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: CSRF token to include in requests

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Human-readable error message
        code:
          type: string
          description: Machine-readable error code
      required:
        - error
        - message

    EndpointStats:
      type: object
      properties:
        endpoint:
          type: string
          description: Endpoint path
        method:
          type: string
          description: HTTP method
        requestCount:
          type: integer
          description: Total number of requests
        successCount:
          type: integer
          description: Number of successful requests
        clientErrorCount:
          type: integer
          description: Number of 4xx errors
        serverErrorCount:
          type: integer
          description: Number of 5xx errors
        avgResponseTime:
          type: number
          format: float
          description: Average response time in milliseconds
        minResponseTime:
          type: number
          format: float
          description: Minimum response time
        maxResponseTime:
          type: number
          format: float
          description: Maximum response time
        firstAccess:
          type: string
          format: date-time
          description: First time endpoint was accessed
        lastAccess:
          type: string
          format: date-time
          description: Last time endpoint was accessed

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Session-based authentication via cookies

  # ─── Phase 6 Routers ─────────────────────────────────────────────────────────

  /trpc/competitor.listCompetitors:
    get:
      tags: [Competitor Intelligence]
      summary: List all competitors
      operationId: competitorListCompetitors
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Competitors list}
        "401": {description: Unauthorized}

  /trpc/competitor.runIntelligenceAnalysis:
    post:
      tags: [Competitor Intelligence]
      summary: Run AI competitor intelligence analysis
      operationId: competitorRunIntelligenceAnalysis
      security: [{sessionAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  properties:
                    competitorId: {type: integer}
      responses:
        "200": {description: Analysis completed}
        "401": {description: Unauthorized}

  /trpc/competitor.getMarketPositionReport:
    get:
      tags: [Competitor Intelligence]
      summary: Get AI market position report
      operationId: competitorGetMarketPositionReport
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Market position report}
        "401": {description: Unauthorized}

  /trpc/persephoneRag.getRagEnhancedResponse:
    post:
      tags: [Persephone Board RAG]
      summary: Get RAG-enhanced board member response (PB-01/02/03)
      operationId: persephoneRagGetRagEnhancedResponse
      security: [{sessionAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  required: [memberId, query]
                  properties:
                    memberId: {type: string}
                    query: {type: string}
                    topK: {type: integer, default: 5}
      responses:
        "200": {description: RAG-enhanced response}
        "401": {description: Unauthorized}

  /trpc/persephoneRag.ingestBoardKnowledge:
    post:
      tags: [Persephone Board RAG]
      summary: Ingest knowledge into board corpus
      operationId: persephoneRagIngestBoardKnowledge
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Knowledge ingested}
        "401": {description: Unauthorized}

  /trpc/persephoneRag.searchBoardKnowledge:
    post:
      tags: [Persephone Board RAG]
      summary: Semantic search over board knowledge corpus
      operationId: persephoneRagSearchBoardKnowledge
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Search results}
        "401": {description: Unauthorized}

  /trpc/scheduledReports.listSchedules:
    get:
      tags: [Scheduled Reports]
      summary: List report schedules (DB-persisted)
      operationId: scheduledReportsListSchedules
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Report schedules}
        "401": {description: Unauthorized}

  /trpc/scheduledReports.createSchedule:
    post:
      tags: [Scheduled Reports]
      summary: Create a new report schedule
      operationId: scheduledReportsCreateSchedule
      security: [{sessionAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  required: [name, reportType, frequency]
                  properties:
                    name: {type: string}
                    reportType: {type: string}
                    frequency: {type: string, enum: [daily, weekly, monthly]}
                    recipients: {type: array, items: {type: string}}
      responses:
        "200": {description: Schedule created}
        "401": {description: Unauthorized}

  /trpc/scheduledReports.generateReport:
    post:
      tags: [Scheduled Reports]
      summary: Generate an on-demand AI report
      operationId: scheduledReportsGenerateReport
      security: [{sessionAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  required: [reportType]
                  properties:
                    reportType:
                      type: string
                      enum: [executive_summary, agent_performance, competitive_intelligence, innovation_pipeline, financial_overview, custom]
                    periodDays: {type: integer, default: 7}
      responses:
        "200": {description: Report generated}
        "401": {description: Unauthorized}

  /trpc/promptVersions.listPromptKeys:
    get:
      tags: [Prompt Version History]
      summary: List all prompt keys (DB-persisted)
      operationId: promptVersionsListPromptKeys
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Prompt keys list}
        "401": {description: Unauthorized}

  /trpc/promptVersions.saveVersion:
    post:
      tags: [Prompt Version History]
      summary: Save a new prompt version to DB
      operationId: promptVersionsSaveVersion
      security: [{sessionAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                input:
                  type: object
                  required: [promptKey, content]
                  properties:
                    promptKey: {type: string, pattern: "^(agent|board|system):[a-zA-Z0-9_-]+$"}
                    content: {type: string}
                    description: {type: string}
                    setActive: {type: boolean, default: true}
      responses:
        "200": {description: Version saved}
        "401": {description: Unauthorized}

  /trpc/promptVersions.rollback:
    post:
      tags: [Prompt Version History]
      summary: Roll back to a previous prompt version
      operationId: promptVersionsRollback
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Rollback successful}
        "401": {description: Unauthorized}

  /trpc/ventures.list:
    get:
      tags: [Autonomous Ventures]
      summary: List all autonomous ventures
      operationId: venturesList
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Ventures list}
        "401": {description: Unauthorized}

  /trpc/ventures.createVenture:
    post:
      tags: [Autonomous Ventures]
      summary: Create a new autonomous venture
      operationId: venturesCreateVenture
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Venture created}
        "401": {description: Unauthorized}

  /trpc/ventures.setKillSwitch:
    post:
      tags: [Autonomous Ventures]
      summary: Activate or deactivate the kill switch
      description: Emergency halt for all autonomous venture actions
      operationId: venturesSetKillSwitch
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Kill switch state updated}
        "401": {description: Unauthorized}

  /trpc/aiAgentsMonitoring.getLiveActivityFeed:
    get:
      tags: [AI Agents]
      summary: Get live agent activity feed
      operationId: aiAgentsMonitoringGetLiveActivityFeed
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Live activity feed}
        "401": {description: Unauthorized}

  /trpc/aiAgentsMonitoring.getPerformanceMetrics:
    get:
      tags: [AI Agents]
      summary: Get per-agent performance metrics and ratings
      operationId: aiAgentsMonitoringGetPerformanceMetrics
      security: [{sessionAuth: []}]
      responses:
        "200": {description: Performance metrics}
        "401": {description: Unauthorized}
