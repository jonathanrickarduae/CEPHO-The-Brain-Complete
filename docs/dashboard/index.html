<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CEPHO.AI — Grand Master Plan v12 Dashboard</title>
    <style>
      :root {
        --bg: #0f1117;
        --surface: #1a1d27;
        --surface2: #22263a;
        --border: #2e3250;
        --accent: #6c63ff;
        --accent2: #00d4aa;
        --warn: #f59e0b;
        --danger: #ef4444;
        --text: #e2e8f0;
        --muted: #8892a4;
        --done: #10b981;
        --inprog: #6c63ff;
        --notstarted: #374151;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", system-ui, sans-serif;
        font-size: 14px;
      }
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 16px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      header h1 {
        font-size: 18px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.3px;
      }
      header .subtitle {
        font-size: 12px;
        color: var(--muted);
        margin-top: 2px;
      }
      .overall-bar {
        background: var(--surface2);
        border-radius: 8px;
        height: 8px;
        width: 200px;
        overflow: hidden;
      }
      .overall-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
        border-radius: 8px;
        transition: width 0.5s;
      }
      .overall-pct {
        font-size: 13px;
        font-weight: 700;
        color: var(--accent2);
        margin-left: 10px;
      }
      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px 16px;
      }
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .stat-card .label {
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .stat-card .value {
        font-size: 26px;
        font-weight: 800;
        margin-top: 4px;
      }
      .stat-card .value.done {
        color: var(--done);
      }
      .stat-card .value.inprog {
        color: var(--inprog);
      }
      .stat-card .value.notstarted {
        color: var(--muted);
      }
      .stat-card .value.total {
        color: var(--text);
      }
      .filters {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .filter-btn {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 6px 14px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 12px;
        transition: all 0.2s;
      }
      .filter-btn:hover,
      .filter-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .phase-block {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-bottom: 16px;
        overflow: hidden;
      }
      .phase-header {
        padding: 16px 20px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 12px;
        user-select: none;
      }
      .phase-header:hover {
        background: var(--surface2);
      }
      .phase-badge {
        background: var(--accent);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        padding: 3px 8px;
        border-radius: 4px;
        white-space: nowrap;
      }
      .phase-badge.ph0 {
        background: #7c3aed;
      }
      .phase-badge.ph1 {
        background: #2563eb;
      }
      .phase-badge.ph2 {
        background: #0891b2;
      }
      .phase-badge.ph3 {
        background: #059669;
      }
      .phase-badge.ph4 {
        background: #d97706;
      }
      .phase-badge.ph5 {
        background: #dc2626;
      }
      .phase-badge.ph6 {
        background: #7c3aed;
      }
      .phase-badge.ph7 {
        background: #be185d;
      }
      .phase-badge.phapp {
        background: #374151;
      }
      .phase-title {
        font-weight: 700;
        font-size: 15px;
        flex: 1;
      }
      .phase-progress {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 160px;
      }
      .phase-bar {
        background: var(--surface2);
        border-radius: 4px;
        height: 6px;
        flex: 1;
        overflow: hidden;
      }
      .phase-bar-fill {
        height: 100%;
        border-radius: 4px;
        transition: width 0.5s;
      }
      .phase-pct {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        min-width: 32px;
        text-align: right;
      }
      .phase-toggle {
        color: var(--muted);
        font-size: 16px;
        transition: transform 0.2s;
      }
      .phase-toggle.open {
        transform: rotate(90deg);
      }
      .task-list {
        padding: 0 20px 16px;
        display: none;
      }
      .task-list.open {
        display: block;
      }
      .task-item {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .task-item:last-child {
        border-bottom: none;
      }
      .task-status {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 1px;
        cursor: pointer;
        border: 2px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        transition: all 0.2s;
      }
      .task-status.done {
        background: var(--done);
        border-color: var(--done);
      }
      .task-status.in-progress {
        background: var(--inprog);
        border-color: var(--inprog);
      }
      .task-status.not-started {
        background: transparent;
        border-color: var(--muted);
      }
      .task-status.gap {
        background: transparent;
        border-color: var(--warn);
      }
      .task-info {
        flex: 1;
      }
      .task-name {
        font-size: 13px;
        font-weight: 500;
        line-height: 1.4;
      }
      .task-meta {
        display: flex;
        gap: 6px;
        margin-top: 4px;
        flex-wrap: wrap;
      }
      .task-tag {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 3px;
        font-weight: 600;
      }
      .tag-page {
        background: rgba(14, 165, 233, 0.15);
        color: #38bdf8;
        border: 1px solid rgba(14, 165, 233, 0.3);
      }
      .tag-gap {
        background: rgba(245, 158, 11, 0.15);
        color: var(--warn);
        border: 1px solid rgba(245, 158, 11, 0.3);
      }
      .tag-spec {
        background: rgba(108, 99, 255, 0.15);
        color: #a78bfa;
        border: 1px solid rgba(108, 99, 255, 0.3);
      }
      .tag-process {
        background: #0891b2;
        color: white;
      }
      .tag-planned {
        background: #dc2626;
        color: white;
      }
      .tag-cross-cutting {
        background: #7c3aed;
        color: white;
      }
      .tag-precond {
        background: rgba(16, 185, 129, 0.15);
        color: var(--done);
        border: 1px solid rgba(16, 185, 129, 0.3);
      }
      .tag-appendix {
        background: rgba(55, 65, 81, 0.5);
        color: var(--muted);
        border: 1px solid var(--border);
      }
      .status-cycle {
        display: flex;
        gap: 6px;
        margin-top: 6px;
      }
      .status-btn {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 3px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        transition: all 0.15s;
      }
      .status-btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .status-btn.active-done {
        background: rgba(16, 185, 129, 0.2);
        border-color: var(--done);
        color: var(--done);
      }
      .status-btn.active-inprog {
        background: rgba(108, 99, 255, 0.2);
        border-color: var(--inprog);
        color: #a78bfa;
      }
      .status-btn.active-notstarted {
        background: var(--surface2);
        border-color: var(--muted);
        color: var(--muted);
      }
      .legend {
        display: flex;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .legend-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }
      .search-bar {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        color: var(--text);
        font-size: 13px;
        margin-bottom: 20px;
        outline: none;
      }
      .search-bar:focus {
        border-color: var(--accent);
      }
      @media (max-width: 600px) {
        header {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
        }
        .phase-progress {
          min-width: 100px;
        }
      }
    </style>
  </head>

      <div class="filters">

        <button class="filter-btn" onclick="setFilter('in-progress',this)">

        <button class="filter-btn" onclick="setFilter('gap',this)">

      <div class="legend">
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--done)"></div>
          Done
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background: var(--inprog)"></div>
          In Progress
        </div>
        <div class="legend-item">
          <div
            class="legend-dot"
            style="background: var(--muted); border: 1px solid var(--muted)"
          ></div>
          Not Started
        </div>
        <div class="legend-item">
          <div
            class="legend-dot"
            style="background: transparent; border: 2px solid var(--warn)"
          ></div>
          Gap Item
        </div>
      </div>

      <div id="phases-container"></div>
    </main>

      // Load saved state from localStorage
      function loadState() {
        const saved = localStorage.getItem("cepho-dashboard-v11");
        if (saved) {
          const state = JSON.parse(saved);
          PHASES.forEach(phase => {
            phase.tasks.forEach(task => {
              if (state[task.id]) task.status = state[task.id];
            });
          });
        }
      }

      function saveState() {
        const state = {};
        PHASES.forEach(phase => {
          phase.tasks.forEach(task => {
            state[task.id] = task.status;
          });
        });
        localStorage.setItem("cepho-dashboard-v11", JSON.stringify(state));
      }

      function setStatus(taskId, status) {
        PHASES.forEach(phase => {
          phase.tasks.forEach(task => {
            if (task.id === taskId) task.status = status;
          });
        });
        saveState();
        render();
      }

      let currentFilter = "all";
      let currentSearch = "";

      function setFilter(filter, btn) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-btn")
          .forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        render();
      }

      function filterTasks() {
        currentSearch = document.getElementById("search").value.toLowerCase();
        render();
      }

      function getPhaseColor(id) {
        const phase = PHASES.find(p => p.id === id);
        return phase ? phase.color : "#6c63ff";
      }

      function render() {
        let totalDone = 0,
          totalInprog = 0,
          totalNotStarted = 0,
          totalGaps = 0,
          totalAll = 0;

        PHASES.forEach(phase => {
          phase.tasks.forEach(task => {
            totalAll++;
            if (task.gap) totalGaps++;
            if (task.status === "done") totalDone++;
            else if (task.status === "in-progress") totalInprog++;
            else totalNotStarted++;
          });
        });

        document.getElementById("s-total").textContent = totalAll;
        document.getElementById("s-done").textContent = totalDone;
        document.getElementById("s-inprog").textContent = totalInprog;
        document.getElementById("s-notstarted").textContent = totalNotStarted;
        document.getElementById("s-gaps").textContent = totalGaps;

        const pct = totalAll > 0 ? Math.round((totalDone / totalAll) * 100) : 0;
        document.getElementById("overall-fill").style.width = pct + "%";
        document.getElementById("overall-pct").textContent = pct + "%";

        const container = document.getElementById("phases-container");
        container.innerHTML = "";

        PHASES.forEach(phase => {
          let phaseDone = 0;
          const filteredTasks = phase.tasks.filter(task => {
            const matchFilter =
              currentFilter === "all" ||
              (currentFilter === "gap" && task.gap) ||
              task.status === currentFilter;
            const matchSearch =
              !currentSearch ||
              task.name.toLowerCase().includes(currentSearch) ||
              phase.title.toLowerCase().includes(currentSearch) ||
              phase.label.toLowerCase().includes(currentSearch);
            return matchFilter && matchSearch;
          });

          phase.tasks.forEach(t => {
            if (t.status === "done") phaseDone++;
          });
          const phasePct =
            phase.tasks.length > 0
              ? Math.round((phaseDone / phase.tasks.length) * 100)
              : 0;

          if (filteredTasks.length === 0 && currentSearch) return;

          const block = document.createElement("div");
          block.className = "phase-block";

          const isOpen = localStorage.getItem("open-" + phase.id) !== "false";

          block.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <span class="phase-badge ${phase.id}" style="background:${phase.color}">${phase.label}</span>
        <span class="phase-title">${phase.title}</span>
        <div class="phase-progress">
          <div class="phase-bar"><div class="phase-bar-fill" style="width:${phasePct}%;background:${phase.color}"></div></div>
          <span class="phase-pct">${phasePct}%</span>
        </div>
        <span class="phase-toggle ${isOpen ? "open" : ""}">▶</span>
      </div>
      <div class="task-list ${isOpen ? "open" : ""}" id="tasks-${phase.id}">
        ${filteredTasks
          .map(
            task => `
          <div class="task-item" data-id="${task.id}" data-status="${task.status}" data-gap="${task.gap || false}">
            <div class="task-status ${task.status} ${task.gap ? "gap" : ""}" title="Click to cycle status" onclick="cycleStatus('${task.id}')">
              ${task.status === "done" ? "✓" : task.status === "in-progress" ? "●" : ""}
            </div>
            <div class="task-info">
              <div class="task-name" style="${task.status === "done" ? "text-decoration:line-through;opacity:0.5" : ""}">${task.name}</div>
              <div class="task-meta">
                ${task.tags.map(tag => `<span class="task-tag tag-${tag}">${tag}</span>`).join("")}
              </div>
              <div class="status-cycle">
                <span class="status-btn ${task.status === "not-started" ? "active-notstarted" : ""}" onclick="setStatus('${task.id}','not-started')">Not Started</span>
                <span class="status-btn ${task.status === "in-progress" ? "active-inprog" : ""}" onclick="setStatus('${task.id}','in-progress')">In Progress</span>
                <span class="status-btn ${task.status === "done" ? "active-done" : ""}" onclick="setStatus('${task.id}','done')">Done</span>
              </div>
            </div>
          </div>
        `
          )
          .join("")}
      </div>
    `;
          container.appendChild(block);
        });
      }

      function togglePhase(id) {
        const list = document.getElementById("tasks-" + id);
        const isOpen = list.classList.toggle("open");
        const toggle =
          list.previousElementSibling.querySelector(".phase-toggle");
        toggle.classList.toggle("open", isOpen);
        localStorage.setItem("open-" + id, isOpen);
      }

      function cycleStatus(taskId) {
        let current;
        PHASES.forEach(phase => {
          phase.tasks.forEach(task => {
            if (task.id === taskId) current = task.status;
          });
        });
        const next =
          current === "not-started"
            ? "in-progress"
            : current === "in-progress"
              ? "done"
              : "not-started";
        setStatus(taskId, next);
      }

      loadState();
      render();
    </script>
